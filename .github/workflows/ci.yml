name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run site checks
        run: npm test
      - name: Check PHP syntax
        run: |
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(
            find scripts web -type f -name '*.php' \
              ! -path 'web/lib/*' \
              ! -path 'web/mail-config.php' -print0
          )
      - name: Check generated output
        run: git diff --exit-code -- web/
